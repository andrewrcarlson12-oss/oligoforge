# Render Blueprint: connect this repository, then provide the secret values in the dashboard.
services:
  - type: web
    name: oligoforge
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: OLIGOFORGE_HOSTED
        value: "1"
      - key: OLIGOFORGE_ALLOW_SERVER_STORAGE
        value: "0"
      - key: OLIGOFORGE_ALLOW_SHARED_CONDITIONS
        value: "0"
      - key: OLIGOFORGE_EMAIL
        sync: false
      - key: OLIGOFORGE_NCBI_KEY
        sync: false
