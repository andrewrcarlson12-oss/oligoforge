name: build

# Build double-click executables for Windows, macOS (Apple Silicon + Intel), and Linux.
# Push a version tag to cut a release with all binaries attached:
#     git tag v1.0.0 && git push origin v1.0.0
# Or run manually from the Actions tab (workflow_dispatch) to get artifacts.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write          # needed to attach binaries to the release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows-x64
            src: dist/OligoForge.exe
            out: OligoForge-windows-x64.exe
          - os: macos-latest         # Apple Silicon (M1/M2/M3/M4)
            label: macos-arm64
            src: dist/OligoForge
            out: OligoForge-macos-arm64
          - os: macos-13             # Intel Macs
            label: macos-intel
            src: dist/OligoForge
            out: OligoForge-macos-intel
          - os: ubuntu-latest
            label: linux-x64
            src: dist/OligoForge
            out: OligoForge-linux-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Build the executable
        run: pyinstaller oligoforge.spec --noconfirm

      - name: Smoke-test the frozen binary
        run: python ci_smoke.py

      - name: Name the binary per platform
        shell: bash
        run: cp "${{ matrix.src }}" "${{ matrix.out }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.out }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.out }}
